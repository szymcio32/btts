data_file: "games-data.json"

leagues:
  - name: "Premier League"
    abbreviation: "EPL"
  - name: "La Liga"
    abbreviation: "LIGA"
  - name: "Bundesliga"
    abbreviation: "BL"
  - name: "Serie A"
    abbreviation: "SA"
  - name: "Ligue 1"
    abbreviation: "L1"

btts:
  order_size: 30
  price_diff: 0.02
  min_order_size: 5
  expiration_hour_offset: 1

liquidity:
  standard_depth: 1000
  deep_book_threshold: 2000
  low_liquidity_total: 500
  tick_offset: 0.01

timing:
  daily_fetch_hour_utc: 23
  fill_poll_interval_seconds: 30
  pre_kickoff_minutes: 10

logging:
  level: "INFO"
  file_path: "btts_bot.log"
  max_bytes: 10485760
  backup_count: 5
